<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#FF7F00" />
    <title>Kumbh360 Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Poppins, Arial, sans-serif;
        background:
          radial-gradient(circle at top, rgba(255, 127, 0, 0.14), transparent 30%),
          linear-gradient(180deg, #fff9f2 0%, #f7f9fc 100%);
        color: #0f172a;
      }

      main {
        width: min(100%, 520px);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 20px 80px rgba(15, 23, 42, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 18px;
        border-radius: 16px;
        background: #ff7f00;
        color: #fff;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <p style="font-size: 0.8rem; letter-spacing: 0.28em; text-transform: uppercase; color: #c45d00;">
        Offline mode
      </p>
      <h1>Kumbh360 is temporarily offline</h1>
      <p>
        The app shell is still available, but this screen needs a connection to
        refresh live content. Reconnect and reopen the route when you are ready.
      </p>
      <a href="/">Return to app</a>
    </main>
  </body>
</html>
